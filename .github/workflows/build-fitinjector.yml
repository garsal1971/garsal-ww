name: Build FitStepsInjector APK

on:
  push:
    branches:
      - master
      - 'claude/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > FitStepsInjector/app/google-services.json

      - name: Decode keystore
        run: echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 -d > FitStepsInjector/fitinjector.jks

      - name: Make gradlew executable
        run: chmod +x FitStepsInjector/gradlew

      - name: Build FitStepsInjector release APK
        working-directory: FitStepsInjector
        env:
          KEYSTORE_PATH: ../fitinjector.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload release APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitStepsInjector-release-${{ github.run_number }}
          path: FitStepsInjector/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
