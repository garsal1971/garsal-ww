name: Build FitStepsInjector APK

on:
  push:
    branches:
      - master
      - 'claude/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > FitStepsInjector/app/google-services.json

      - name: Make gradlew executable
        run: chmod +x FitStepsInjector/gradlew

      - name: Build FitStepsInjector debug APK
        working-directory: FitStepsInjector
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitStepsInjector-debug-${{ github.run_number }}
          path: FitStepsInjector/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
