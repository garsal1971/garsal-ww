name: Build FitStepsInjector APK

on:
  push:
    branches:
      - master
      - 'claude/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x FitStepsInjector/gradlew

      - name: Restore signing keystore from secrets
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ~/.android/release.jks

      - name: Build FitStepsInjector release APK
        working-directory: FitStepsInjector
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Sign APK with keystore
        run: |
          APK=FitStepsInjector/app/build/outputs/apk/release/app-release-unsigned.apk
          SIGNED_APK=FitStepsInjector/app/build/outputs/apk/release/app-release-signed.apk
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)/zipalign -v 4 $APK /tmp/aligned.apk
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)/apksigner sign \
            --ks ~/.android/release.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out $SIGNED_APK \
            /tmp/aligned.apk
          echo "APK firmato con il keystore dal secret"

      - name: Upload release APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitStepsInjector-release-${{ github.run_number }}
          path: FitStepsInjector/app/build/outputs/apk/release/app-release-signed.apk
          retention-days: 30
