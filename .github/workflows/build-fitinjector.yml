name: Build FitStepsInjector APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x FitStepsInjector/gradlew

      - name: Restore fixed signing keystore
        run: |
          mkdir -p ~/.android
          echo "" | base64 -d > ~/.android/fitinjector.jks
          echo "Keystore ripristinato"
          echo "SHA-1 fisso: 9E:0D:F1:6D:F2:FF:DE:A5:1B:43:26:E4:B8:30:B1:8F:15:53:D9:C1"

      - name: Build FitStepsInjector debug APK
        working-directory: FitStepsInjector
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/../../../home/runner/.android/fitinjector.jks
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Sign APK with fixed keystore
        run: |
          APK=FitStepsInjector/app/build/outputs/apk/debug/app-debug.apk
          SIGNED_APK=FitStepsInjector/app/build/outputs/apk/debug/app-debug-signed.apk
          # align
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)/zipalign -v 4 $APK /tmp/aligned.apk
          # sign with fixed keystore
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)/apksigner sign \
            --ks ~/.android/fitinjector.jks \
            --ks-key-alias fitinjector \
            --ks-pass pass:fitinjector123 \
            --key-pass pass:fitinjector123 \
            --out $SIGNED_APK \
            /tmp/aligned.apk
          echo "APK firmato con SHA-1: 9E:0D:F1:6D:F2:FF:DE:A5:1B:43:26:E4:B8:30:B1:8F:15:53:D9:C1"

      - name: Upload signed APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitStepsInjector-signed-${{ github.run_number }}
          path: FitStepsInjector/app/build/outputs/apk/debug/app-debug-signed.apk
          retention-days: 30
