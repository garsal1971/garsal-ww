name: Build FitStepsInjector APK

on:
  push:
    branches:
      - master
      - 'claude/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x FitStepsInjector/gradlew

      - name: Debug SDK environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls ${ANDROID_HOME}/platforms/ 2>/dev/null || echo "no platforms dir"
          ls ${ANDROID_HOME}/build-tools/ 2>/dev/null || echo "no build-tools dir"

      - name: Create local.properties
        run: echo "sdk.dir=${ANDROID_HOME}" > FitStepsInjector/local.properties

      - name: Build FitStepsInjector debug APK
        working-directory: FitStepsInjector
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace 2>&1

      - name: Upload debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitStepsInjector-debug-${{ github.run_number }}
          path: FitStepsInjector/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
