name: Build FitStepsInjector APK

on:
  push:
    branches:
      - master
      - 'claude/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x FitStepsInjector/gradlew

      - name: Build FitStepsInjector debug APK
        working-directory: FitStepsInjector
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Print debug keystore SHA-1 (register this in Google Cloud Console)
        run: |
          mkdir -p ~/.android
          [ -f ~/.android/debug.keystore ] || keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "======================================================="
          echo "  SHA-1 DEL DEBUG KEYSTORE (usa questo in Google Cloud)"
          echo "======================================================="
          keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android | grep "SHA1:"
          echo "======================================================="

      - name: Upload debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitStepsInjector-debug-${{ github.run_number }}
          path: FitStepsInjector/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
