name: Generate Release Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -alias fitinjector \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore fitinjector.jks \
            -storepass fitinjector123 \
            -keypass fitinjector123 \
            -dname "CN=FitStepsInjector, OU=garsal, O=garsal, L=IT, S=IT, C=IT"

      - name: Print SHA-1 (copy this to Google Cloud Console)
        run: |
          echo "============================================"
          echo "  SHA-1 DA REGISTRARE IN GOOGLE CLOUD CONSOLE"
          echo "============================================"
          keytool -list -v \
            -keystore fitinjector.jks \
            -alias fitinjector \
            -storepass fitinjector123 \
            | grep "SHA1:"
          echo "============================================"
          echo ""
          echo "KEYSTORE_BASE64 (salva come GitHub Secret):"
          echo "--------------------------------------------"
          base64 -w 0 fitinjector.jks
          echo ""
          echo "--------------------------------------------"
          echo "KEYSTORE_PASSWORD: fitinjector123"
          echo "KEY_ALIAS: fitinjector"
          echo "KEY_PASSWORD: fitinjector123"

      - name: Upload keystore as artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitinjector-keystore
          path: fitinjector.jks
          retention-days: 1
