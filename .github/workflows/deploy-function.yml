name: Deploy Supabase Edge Function

on:
  workflow_dispatch:
  push:
    branches:
      - claude/weward-telegram-bot-6dqukw
      - master
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    name: Deploy telegram-bot function
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy telegram-bot --no-verify-jwt

      - name: Set Telegram bot token secret
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase secrets set TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Register Telegram webhook
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "{\"url\": \"https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co/functions/v1/telegram-bot\"}" \
            | jq .
