name: Build SilentMockGPS APK

on:
  push:
    branches:
      - master
      - 'claude/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        run: |
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 -d > ${{ github.workspace }}/fitinjector.jks

      - name: Make gradlew executable
        run: chmod +x SilentMockGPS/gradlew

      - name: Build SilentMockGPS release APK
        working-directory: SilentMockGPS
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/fitinjector.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            -PversionCode=${{ github.run_number }} \
            -PversionName="1.${{ github.run_number }}"

      - name: Upload release APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SilentMockGPS-release-${{ github.run_number }}
          path: SilentMockGPS/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
