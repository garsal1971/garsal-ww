plugins {
    id 'com.android.application'
}

android {
    namespace 'com.garsal.silentmockgps'
    compileSdk 34

    defaultConfig {
        applicationId "com.garsal.silentmockgps"
        minSdk 21
        targetSdk 34
        versionCode (project.hasProperty('versionCode') ? project.versionCode.toInteger() : 1)
        versionName (project.hasProperty('versionName') ? project.versionName : "1.0")
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.core:core:1.12.0'
}
